PART
{
	name = MiniAstrophageEngine
	module = Part
	author = Janus92 / enryofalitz aka bryguy4
	mesh = MiniAstrophageEngine.mu
	scale = 1
	rescaleFactor = 1
	node_stack_top = 0.0, 0.47, 0.0, 0.0, 1.0, 0.0, 0
	node_stack_bottom = 0.0, -0.1482, 0.0, 0.0, -1.0, 0.0, 0
	TechRequired = nuclearPropulsion
	entryCost = 28000
	cost = 10000
	category = Engine
	subcategory = 0
	title = APS-062 Miniaturized Astrophage Propulsion System
	manufacturer = Weir Technologies
	description = A smaller astrophage engine for interstellar probes or smaller ships, created after the engineers decided to use probes to return interstellar science. Like all astrophage engines, it runs constantly at a negligible thrust setting to provide electricity for the spacecraft.
	attachRules = 1,1,1,1,0
	mass = 1.2
	dragModelType = default
	maximum_drag = 0.2
	minimum_drag = 0.2
	angularDrag = 2
	crashTolerance = 7
	maxTemp = 3000
	bulkheadProfiles = size0
	tags = astrophage hail mary mini ion engine efficient thrust vacuum probe
	MODULE
	{
		name = ModuleGenerator
		isAlwaysActive = true
		OUTPUT_RESOURCE
		{
			name = ElectricCharge
			rate = 50 // never run out of EC again!
		}
	}

	MODULE
	{
		name = ModuleEnginesFX
		engineID = Astrophage
		thrustVectorTransformName = thrustTransform
		exhaustDamage = False
		ignitionThreshold = 0.1
		minThrust = 0
		maxThrust = 350
		heatProduction = 80
		powerEffectName = IonPlume
		EngineType = Nuclear
		PROPELLANT
		{
			name = Astrophage
			ratio = 1
			DrawGauge = True
		}
		atmosphereCurve
		{
			key = 0 640000
			key = 1 360000
			key = 5 900
		}
	}

	MODULE
	{
		name = ModuleGimbal
		gimbalTransformName = thrustTransform
		gimbalRange = 2
	}
	
	MODULE
	{
		name = FXModuleAnimateThrottle
		animationName = colorAnimation
		dependOnEngineState = True
		responseSpeed = 1.0
		engineName = Astrophage
		dependOnThrottle = True
	}
	
	EFFECTS
	{		
		IonPlume
		{
			AUDIO
			{
				channel = Ship
				clip = sound_IonEngine
				volume = 0.0 0.0
				volume = 0.05 0.20
				volume = 1.0 0.25
				pitch = 0.0 0.2
				pitch = 1.0 0.8
				loop = true
			}
			MODEL_MULTI_PARTICLE // for testing
