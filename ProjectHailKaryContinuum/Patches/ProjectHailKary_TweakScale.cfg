// TweakScale support for Project Hail Kary Continued
// Requires TweakScale and ModuleManager

TWEAKSCALEEXPONENTS:NEEDS[TweakScale]
{
	name = ModuleEnginesFX
	maxThrust = 2
}

TWEAKSCALEEXPONENTS:NEEDS[TweakScale]
{
	name = ModuleRCSFX
	thrusterPower = 2
}

TWEAKSCALEEXPONENTS:NEEDS[TweakScale]
{
	name = ModuleCargoPart
	packedVolume = 3
}

TWEAKSCALEEXPONENTS:NEEDS[TweakScale]
{
	name = RESOURCE
	amount = 3
	maxAmount = 3
}

@PART[AstrophageEngine]:NEEDS[TweakScale]
{
	!MODULE[TweakScale] {}
	MODULE
	{
		name = TweakScale
		type = stack
		defaultScale = 2.5
	}
}

@PART[MiniAstrophageEngine]:NEEDS[TweakScale]
{
	!MODULE[TweakScale] {}
	MODULE
	{
		name = TweakScale
		type = stack
		defaultScale = 0.625
	}
}

